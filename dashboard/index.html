<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/mac_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wabtec SCC Portal — MAC Products</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              mac: {
                navy: '#1a365d',
                blue: '#2c5aa0',
                light: '#f0f4f8',
                accent: '#3182ce',
              }
            },
            fontFamily: {
              sans: ['DM Sans', 'system-ui', 'sans-serif'],
              mono: ['Space Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    <style>
      body { font-family: 'DM Sans', system-ui, sans-serif; }
      .sidebar {
        background: linear-gradient(180deg, #1a365d 0%, #1e3a5f 100%);
      }
      .nav-active { position: relative; }
      .nav-active::before {
        content: '';
        position: absolute;
        left: 0; top: 50%;
        transform: translateY(-50%);
        width: 3px; height: 60%;
        background: #3b82f6;
        border-radius: 0 4px 4px 0;
      }
      @keyframes fadeSlide {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .view-transition { animation: fadeSlide 0.3s ease-out; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
